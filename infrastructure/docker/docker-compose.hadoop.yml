services:

  # ============================================================
  # NameNode
  # ============================================================

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    restart: unless-stopped

    ports:
      - "9870:9870"
      - "9000:9000"

    env_file:
      - .env

    environment:
      CLUSTER_NAME: hadoop-cluster

    volumes:
      - namenode-data:/hadoop/dfs/name

    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9870'"]
      interval: 15s
      timeout: 5s
      retries: 10

    networks:
      - hadoop-network

  # ============================================================
  # DataNode
  # ============================================================

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    restart: unless-stopped

    env_file:
      - .env

    environment:
      SERVICE_PRECONDITION: namenode:9870

    ports:
      - "9864:9864"

    volumes:
      - datanode-data:/hadoop/dfs/data

    depends_on:
      namenode:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9864'"]
      interval: 15s
      timeout: 5s
      retries: 10

    networks:
      - hadoop-network

  # ============================================================
  # ResourceManager
  # ============================================================

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    hostname: resourcemanager
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_healthy

    ports:
      - "8088:8088"

    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8088'"]
      interval: 15s
      timeout: 5s
      retries: 10

    networks:
      - hadoop-network

  # ============================================================
  # NodeManager
  # ============================================================

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    hostname: nodemanager
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      resourcemanager:
        condition: service_healthy

    ports:
      - "8042:8042"

    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8042'"]
      interval: 15s
      timeout: 5s
      retries: 10

    networks:
      - hadoop-network

  # ============================================================
  # HistoryServer
  # ============================================================

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: historyserver
    hostname: historyserver
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      resourcemanager:
        condition: service_healthy

    command: ["/bin/bash", "-lc", "/opt/hadoop-3.2.1/sbin/mr-jobhistory-daemon.sh start historyserver && tail -f /dev/null"]

    ports:
      - "10020:10020"
      - "19888:19888"

    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/10020'"]
      interval: 15s
      timeout: 5s
      retries: 10

    networks:
      - hadoop-network

  # ============================================================
  # Pig
  # ============================================================
  pig:
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.pig

    container_name: pig
    hostname: pig

    tty: true
    stdin_open: true

    depends_on:
      - namenode
      - resourcemanager
      - historyserver

    environment:
      HADOOP_CONF_DIR: /etc/hadoop

    volumes:
      - ../../:/workspace
      - ../hadoop:/etc/hadoop:ro
      - ../pig/pig:/opt/pig:ro

    working_dir: /workspace

    networks:
      - hadoop-network

# ============================================================
# Networks
# ============================================================

networks:
  hadoop-network:
    name: hadoop-network
    driver: bridge

# ============================================================
# Volumes
# ============================================================

volumes:
  namenode-data:
  datanode-data: