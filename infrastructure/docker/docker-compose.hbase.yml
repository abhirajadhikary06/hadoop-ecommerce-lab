services:

  hbase:
    image: harisekhon/hbase:0.92

    container_name: hbase
    hostname: hbase

    restart: unless-stopped

    ports:
      - "2181:2181"
      - "60000:60000"
      - "60010:60010"
      - "60020:60020"
      - "60030:60030"

    environment:
      HBASE_MANAGES_ZK: "true"

    volumes:
      - ../hadoop/core-site.xml:/etc/hadoop/core-site.xml:ro
      - ../hadoop/hdfs-site.xml:/etc/hadoop/hdfs-site.xml:ro
      - hbase-data:/hbase-data

    networks:
      - hadoop-network

networks:
  hadoop-network:
    external: true
    name: hadoop-network

volumes:
  hbase-data: